name: Build & Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AZURE_CONTAINER_REGISTRY: shuraacr
  REGISTRY_URL: shuraacr.azurecr.io
  IMAGE_NAME: shura-app
  CONTAINER_APP_NAME: shura-app
  RESOURCE_GROUP: shura-rg
  ENVIRONMENT_NAME: shura-env

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Log in to Azure Container Registry
        if: github.event_name == 'push'
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.REGISTRY_URL }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Extract metadata
        id: meta
        run: |
          SHA_SHORT=$(echo ${{ github.sha }} | cut -c1-7)
          echo "sha_tag=${{ env.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "latest_tag=${{ env.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_OUTPUT

      - name: Build and push container image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Container Apps (Staging)
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: ${{ env.CONTAINER_APP_NAME }}-staging
          containerAppEnvironment: ${{ env.ENVIRONMENT_NAME }}
          imageToDeploy: ${{ needs.build.outputs.image_tag }}
          targetPort: 5001
          ingress: external
          environmentVariables: |
            NODE_ENV=production
            PORT=5001
            DB_HOST=secretref:db-host
            DB_USER=secretref:db-user
            DB_PASSWORD=secretref:db-password
            DB_NAME=secretref:db-name
            JWT_SECRET=secretref:jwt-secret
            FRONTEND_URL=https://${{ env.CONTAINER_APP_NAME }}-staging.azurecontainerapps.io
            CLOUD_NAME=secretref:cloudinary-name
            CLOUD_API_KEY=secretref:cloudinary-key
            CLOUD_API_SECRET=secretref:cloudinary-secret
            APPLICATIONINSIGHTS_CONNECTION_STRING=secretref:appinsights-conn

  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build, deploy-staging]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Container Apps (Production)
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: ${{ env.CONTAINER_APP_NAME }}
          containerAppEnvironment: ${{ env.ENVIRONMENT_NAME }}
          imageToDeploy: ${{ needs.build.outputs.image_tag }}
          targetPort: 5001
          ingress: external
          environmentVariables: |
            NODE_ENV=production
            PORT=5001
            DB_HOST=secretref:db-host
            DB_USER=secretref:db-user
            DB_PASSWORD=secretref:db-password
            DB_NAME=secretref:db-name
            JWT_SECRET=secretref:jwt-secret
            FRONTEND_URL=https://${{ env.CONTAINER_APP_NAME }}.azurecontainerapps.io
            CLOUD_NAME=secretref:cloudinary-name
            CLOUD_API_KEY=secretref:cloudinary-key
            CLOUD_API_SECRET=secretref:cloudinary-secret
            APPLICATIONINSIGHTS_CONNECTION_STRING=secretref:appinsights-conn
